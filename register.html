<!DOCTYPE html>
<html>
<head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success px-4">
  <span class="navbar-brand fw-bold">🍱 Food Waste App</span>
</nav>

<div class="container mt-5">

<div class="card p-4 shadow">

<h2 class="text-center">Register</h2>

<input type="text" id="name" class="form-control mt-2" placeholder="Full Name">

<input type="email" id="email" class="form-control mt-2" placeholder="Email">

<input type="password" id="password" class="form-control mt-2" placeholder="Password">

<select id="role" class="form-control mt-2">
<option value="donor">Donor</option>
<option value="ngo">NGO</option>
</select>

<button onclick="register()" class="btn btn-success mt-3 w-100">Register</button>

<p class="text-center mt-3">
<a href="login.html">Back to Login</a>
</p>

</div>

</div>
