<!DOCTYPE html>
<html>
<head>
<title>Donor Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#28a745">
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<nav class="navbar navbar-dark bg-success px-4">
  <span class="navbar-brand fw-bold">🍱 Food Waste App</span>
</nav>
<body class="bg-light">

<header class="d-flex justify-content-between p-3 bg-success text-white">
<h2>Donor Dashboard</h2>
<button onclick="logout()" class="btn btn-danger">Logout</button>
</header>


<div class="container mt-4">

<div class="card p-4 shadow-lg">
<h3 class="text-success">Post Surplus Food</h3>

<input type="text" id="foodName" class="form-control mt-3" placeholder="Food Name">

<input type="number" id="quantity" class="form-control mt-3" placeholder="Quantity">

<div class="d-flex mt-3">
<input type="text" id="location" class="form-control me-2" placeholder="Location" readonly>
<button onclick="getLocation()" class="btn btn-secondary">📍</button>
</div>

<input type="time" id="expiry" class="form-control mt-3">

<button onclick="addFood()" class="btn btn-success mt-4 w-100">
➕ Post Food
</button>
</div>

<h3 class="mt-5">📦 My Donations</h3>
<ul id="foodList"></ul>

</div>

</div>
<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
